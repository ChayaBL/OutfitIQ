<!DOCTYPE html>
<html>

<head>
    <title>My Wardrobe - OutfitIQ</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='wardrobe.css') }}">
</head>

<body>

<div class="container">

    <h1>👗 My Wardrobe</h1>

    <p>Add your clothing items.</p>

    <form method="POST" enctype="multipart/form-data">

        <label>Category</label>

        <select name="category">

            <option>Shirt</option>
            <option>T-Shirt</option>
            <option>Jeans</option>
            <option>Trousers</option>
            <option>Shoes</option>

        </select>

        <label>Color</label>

        <input
            type="text"
            name="color"
            placeholder="Blue"
            required
        >

        
        <label>Season</label>

        <select name="season">

            <option>Summer</option>
            <option>Winter</option>
            <option>Rainy</option>
            <option>All Seasons</option>

        </select>

        <label>Clothing Image</label>

        <input
            type="file"
            name="image"
            accept="image/*"
            required
        >

        <button>Add Item</button>

    </form>

    <a href="/dashboard">← Back to Dashboard</a>

    <hr>

    <h2>My Clothes</h2>

    {% for cloth in clothes %}

    <div class="cloth-card">

        <img
            src="{{ url_for('static', filename='uploads/' + cloth[4]) }}"
            width="200"
        >

        <p><b>Category:</b> {{ cloth[1] }}</p>

        <p><b>Color:</b> {{ cloth[2] }}</p>

        <p><b>Season:</b> {{ cloth[3] }}</p>

    </div>

    <hr>

{% endfor %}

</div>

</body>
</html>
