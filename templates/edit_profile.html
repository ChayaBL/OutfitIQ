<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile - OutfitIQ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">
</head>

<body>

<div class="profile-container">

    <h1>✏️ Edit Profile</h1>

    <form method="POST" class="profile-card">

        <label>Name</label>
        <input
            type="text"
            name="name"
            value="{{ user[1] }}"
            required
        >

        <br><br>

        <label>Email</label>
        <input
            type="email"
            name="email"
            value="{{ user[2] }}"
            required
        >

        <br><br>

        <button type="submit" class="edit-btn">
            💾 Save Changes
        </button>

    </form>

    <a href="/profile" class="back-btn">
        ← Back
    </a>

</div>

</body>
</html>
